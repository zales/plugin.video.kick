name: Release & Kodi Repository

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: addon
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zipname=plugin.video.kick-${VERSION}.zip" >> "$GITHUB_OUTPUT"
          # Patch version in addon.xml using sed (avoids Python XML namespace issues)
          sed -i "s|<addon id=\"plugin.video.kick\"[^>]*>|<addon id=\"plugin.video.kick\" name=\"KICK.com\" version=\"${VERSION}\" provider-name=\"zales\">|" addon.xml

      - name: Build addon zip
        run: |
          cd ..
          zip -r "/tmp/${{ steps.addon.outputs.zipname }}" plugin.video.kick \
            --exclude "*.git*" \
            --exclude "*__pycache__*" \
            --exclude "*.pyc" \
            --exclude "*.DS_Store" \
            --exclude "*/repo_output/*"
          mv "/tmp/${{ steps.addon.outputs.zipname }}" "${{ github.workspace }}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KICK.com v${{ steps.addon.outputs.version }}"
          body_path: changelog.txt
          files: ${{ steps.addon.outputs.zipname }}

      - name: Build Kodi repository
        run: python3 .github/scripts/build_repo.py "${{ steps.addon.outputs.version }}"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    auto
        run: |
          pip install awscli --quiet
          aws s3 sync repo_output/ s3://${{ secrets.CF_R2_BUCKET }}/ \
            --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete \
            --no-progress

      - name: Deploy Cloudflare Worker
        working-directory: .github/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npm install -g wrangler@4 --quiet
          # Substitute KV namespace ID into wrangler.toml
          sed -i "s|\$KV_AUTH_RELAY_ID|${{ secrets.CF_KV_AUTH_RELAY_ID }}|g" wrangler.toml
          npx wrangler deploy
