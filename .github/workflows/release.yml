name: Release & Kodi Repository

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read addon version
        id: addon
        run: |
          VERSION=$(python3 -c "
          import xml.etree.ElementTree as ET
          print(ET.parse('addon.xml').getroot().get('version'))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zipname=plugin.video.kick-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Build addon zip
        run: |
          cd ..
          zip -r "/tmp/${{ steps.addon.outputs.zipname }}" plugin.video.kick \
            --exclude "*.git*" \
            --exclude "*__pycache__*" \
            --exclude "*.pyc" \
            --exclude "*.DS_Store" \
            --exclude "*/repo_output/*"
          mv "/tmp/${{ steps.addon.outputs.zipname }}" "${{ github.workspace }}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KICK.com v${{ steps.addon.outputs.version }}"
          body_path: changelog.txt
          files: ${{ steps.addon.outputs.zipname }}

      - name: Build Kodi repository
        run: python3 .github/scripts/build_repo.py "${{ steps.addon.outputs.version }}"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    auto
        run: |
          pip install awscli --quiet
          aws s3 sync repo_output/ s3://${{ secrets.CF_R2_BUCKET }}/ \
            --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete \
            --no-progress

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: .github/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
